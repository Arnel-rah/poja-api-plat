AWSTemplateFormatVersion: 2010-09-09
Description: CD storage database

Parameters:
  Env:
    Type: String

Resources:
  Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: AutomaticExpireTempFiles
            Status: Enabled
            ExpirationInDays: 1
            TagFilters:
              - Key: temporary
                Value: true

  BucketSSM:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Join ['', [/poja-plat-10f4a86e-api/, !Ref Env, /s3/bucket-name]]
      Type: String
      Value: !Ref Bucket

Outputs:
  BucketSSM:
    Value: !Ref BucketSSM