name: Publish client

on:
  workflow_dispatch:

jobs:
  release-version:
    uses: ./.github/workflows/release-version.yml
    secrets: inherit

  publish-to-npm-registry:
    runs-on: ubuntu-latest

    needs: release-version

    env:
      AWS_REGION: eu-west-3

    steps:
      ###############################################################
      ########## GENERATE AND PUBLISH TYPESCRIPT CLIENT #############
      ###############################################################

      - uses: actions/checkout@v4.1.6

      - name: Set up JDK 21
        uses: actions/setup-java@v4.2.1
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: synchronise version with release 
        run: git pull origin ${{ github.ref_name }}

      - name: Read gradle.properties file
        id: extract_version
        run: |
          version=$(grep -oP 'version=\K[^ ]+' gradle.properties)
          echo "::set-output name=version::$version"

      - name: Generate typescript client
        run: ./gradlew generateTsClient -Pargs=${{ steps.extract_version.outputs.version }}

      - uses: hei-school/aws-credentials-setter@v1.0.3
        with:
          secrets: ${{ toJSON(secrets) }}
          region: ${{ env.AWS_REGION }}

      - name: Configure npm client to connect to Codeartifact
        run: |
          sh ./.shell/initNpmrc.sh npm-store-poja-idp-plat-10f4a86e poja-idp-dev 057045785189 eu-west-3

      - name: Setup Node.js
        uses: actions/setup-node@v4.0.2
        with:
          node-version: 17.x

      - name: Publish Typescript client
        run: |
          cd build/gen-ts/
          sed -i "s/\"https:\/\/api.preprod.poja.io\"/\(process.env.REACT_APP_POJA_API_URL || \"\"\)/g" base.ts
          sed -i "s/\"dependencies\"/\"peerDependencies\"/g" package.json
          sed -i '11d' tsconfig.json && sed -i "s/\"es6\",/\"es6\",\"DOM\"/g" tsconfig.json
          echo -e "\n*.ts\nnode_module\n!*.d.ts\n.idea\n.vscode\n.openapi-generator\n.openapi-generator-ignore\ngit_push.sh" >> .npmignore
          npm config set always-auth true
          npm install
          npm publish

      - name: Trigger POJA UI SETUP
        env:
          EVENT_BUS_NAME: ${{ secrets.EVENT_BUS_NAME }}
        run: |
          POJA_API_FRONTAL_URL=$(aws ssm get-parameter \
            --name "/poja-plat-10f4a86e-api/prod/api/url" \
            --query "Parameter.Value" \
            --output text \
            --region "${{ env.AWS_REGION }}")
            
          if [ -z "$POJA_API_FRONTAL_URL" ]; then
            echo "Failed to extract ApiUrl from SSM"
            exit 1
          fi
          echo "Frontal URL: $POJA_API_FRONTAL_URL"
          DETAIL=$(jq -cn \
            --arg deployment_id "0312f41a-0f31-47f9-9875-60b0bf49e14b" \
            --arg step_status "PUBLISH_POJA_API_CLIENT_SUCCESS" \
            --arg project_name "plat-10f4a86e" \
            --arg npm_code_artifact_repository "npm-store-poja-idp-plat-10f4a86e" \
            --arg poja_api_frontal_url "$POJA_API_FRONTAL_URL" \
            --arg poja_api_repo_url "https://github.com/poja-app/poja-api-plat-10f4a86e" \
            '{
              "deployment_id": $deployment_id,
              "step_status": $step_status,
              "next_step_params": {
                "project_name": $project_name,
                "npm_code_artifact_repository": $npm_code_artifact_repository,
                "poja_api_frontal_url": $poja_api_frontal_url,
                "poja_api_repo_url": $poja_api_repo_url
              },
              "message": "Poja api client published."
            }')
          aws events put-events \
            --region "${{ env.AWS_REGION }}" \
            --entries "[{
              \"Source\": \"api.poja.io.event1\",
              \"DetailType\": \"api.poja.io.endpoint.event.model.PlatformInstanceDeploymentStepCompleted\",
              \"Detail\": $(echo "$DETAIL" | jq -Rs .),
              \"EventBusName\": \"$EVENT_BUS_NAME\"
            }]"
          echo "Event sent to trigger INITIALIZE_POJA_UI_REPOSITORY_AND_AMPLIFY_BUILD step."
