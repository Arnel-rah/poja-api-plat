name: POJA Import CI

on:
  push:
    branches:
      - importer/<?import-id>

env:
  ORG_ID: <?org-id>
  IMPORT_ID: <?import-id>

jobs:
  pre-transformation-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    <?test-env-vars>

    steps:
      - uses: actions/checkout@v4.1.6

      - uses: actions/setup-java@v4.2.1
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Run tests and capture outcome
        id: test
        continue-on-error: true
        run: |
          set -o pipefail
          if [ -f "build.gradle" ]; then
            gradle test
          elif [ -f "pom.xml" ]; then
            mvn test
          else
            echo "No build tool detected!" >&2
            exit 1
          fi

          EXIT_CODE=$?

          if [ $EXIT_CODE -eq 0 ]; then
            echo "outcome=SUCCESS" >> $GITHUB_OUTPUT
          else
            echo "outcome=FAILURE" >> $GITHUB_OUTPUT
          fi

      - name: Update import state
        run: |
          OUTCOME="${{ steps.test.outputs.outcome }}"
          RUN_ID="${{ github.run_id }}"

          curl --fail -X POST "https://api.preprod.poja.io/orgs/${{ env.ORG_ID }}/imports/${{ env.IMPORT_ID }}/states" \
            -H "Authorization: AppBearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
                  --arg job_name "PRE_TRANSFORMATION_TEST" \
                  --arg job_outcome "$OUTCOME" \
                  --arg run_id "$RUN_ID" \
                  '{ job_name: $job_name, job_outcome: $job_outcome, run_id: $run_id }')"
