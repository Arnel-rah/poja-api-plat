        scheduled_tasks:
          type: array
          items:
            $ref: "#/components/schemas/ScheduledTask"

  ##############################################################
  #################  Poja Conf 8 ###############################
  #############################################################

  ##############################################################
  #################  Poja Conf 9 ###############################
  #############################################################
    Worker:
      type: object
      properties:
        memory:
          type: number
          example: 1024
        batch:
          type: number
          example: 5
        timeout:
          type: number
          example: 600
        reserved_concurrent_executions_nb:
          type: integer
          nullable: true

    ConcurrencyConf9:
      type: object
      properties:
        frontal_reserved_concurrent_executions_nb:
          type: integer
          nullable: true

    ComputeConf9:
      type: object
      properties:
        frontal_memory:
          type: number
          example: 2048
        frontal_function_timeout:
          type: number
          example: 30
        frontal_function_invocation_method:
          type: string
          enum:
            - LAMBDA_URL
            - HTTP_API
        api_gateway_timeout:
          type: number
          example: 30
          nullable: true
        workers:
          type: array
          items:
            $ref: "#/components/schemas/Worker"

    ScheduledTask9:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        schedule_expression:
          type: string
        event_stack_source:
          type: integer
          minimum: 1
          maximum: 10
        class_name:
          type: string

    PojaConf9:
      type: object
      allOf:
        - $ref: "#/components/schemas/PojaConf"
      required:
        - version
      properties:
        version:
          type: string
        general:
          $ref: "#/components/schemas/GeneralPojaConf7"
        integration:
          $ref: "#/components/schemas/IntegrationConf"
        gen_api_client:
          $ref: "#/components/schemas/GenApiClientConf"
        concurrency:
          $ref: "#/components/schemas/ConcurrencyConf9"
        compute:
          $ref: "#/components/schemas/ComputeConf9"
        emailing:
          $ref: "#/components/schemas/MailingConf"
        testing:
          $ref: "#/components/schemas/TestingConf"
        database:
          $ref: "#/components/schemas/DatabaseConf2"
        scheduled_tasks:
          type: array
          items:
            $ref: "#/components/schemas/ScheduledTask9"

  ##############################################################
  #################  Poja Conf 9 ###############################
  #############################################################

  ##############################################################
  ###############  Poja Configurations #########################
  ##############################################################
