        custom_java_env_vars:
          type: array
          items:
            $ref: "#/components/schemas/EnvVar"

  ##############################################################
  #################  Poja Conf 7 ###############################
  #############################################################

  ##############################################################
  #################  Poja Conf 8 ###############################
  #############################################################

    PojaConf8:
      type: object
      allOf:
        - $ref: "#/components/schemas/PojaConf"
      required:
        - version
      properties:
        version:
          type: string
        general:
          $ref: "#/components/schemas/GeneralPojaConf7"
        integration:
          $ref: "#/components/schemas/IntegrationConf"
        gen_api_client:
          $ref: "#/components/schemas/GenApiClientConf"
        concurrency:
          $ref: "#/components/schemas/ConcurrencyConf2"
        compute:
          $ref: "#/components/schemas/ComputeConf2"
        emailing:
          $ref: "#/components/schemas/MailingConf"
        testing:
          $ref: "#/components/schemas/TestingConf"
        database:
