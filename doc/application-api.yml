openapi: "3.0.2"
operations:
  userApplications:
    parameters:
      - $ref: "./api.yml#/components/parameters/userId"
    get:
      security:
        - bearerAuth: []
      parameters:
        - $ref: "./api.yml#/components/parameters/page"
        - $ref: "./api.yml#/components/parameters/page_size"
      tags:
        - Application
      operationId: getUserApplications
      summary: Get all applications from orgs owned by user
      responses:
        "200":
          description: paged list of applications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedUserApplicationsResponse"
        "400":
          $ref: "./api.yml#/components/responses/400"
        "403":
          $ref: "./api.yml#/components/responses/403"
        "404":
          $ref: "./api.yml#/components/responses/404"
        "429":
          $ref: "./api.yml#/components/responses/429"
        "500":
          $ref: "./api.yml#/components/responses/500"
  orgApplications:
    parameters:
      - $ref: "./api.yml#/components/parameters/orgId"
    get:
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: query
          description: Filter applications by name, case insensitive
          schema:
            type: string
        - $ref: "./api.yml#/components/parameters/page"
        - $ref: "./api.yml#/components/parameters/page_size"
      tags:
        - Application
      operationId: getApplications
      summary: Get all applications
      responses:
        "200":
          description: paged list of applications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedApplicationsResponse"
        "400":
          $ref: "./api.yml#/components/responses/400"
        "403":
          $ref: "./api.yml#/components/responses/403"
        "404":
          $ref: "./api.yml#/components/responses/404"
        "429":
          $ref: "./api.yml#/components/responses/429"
        "500":
          $ref: "./api.yml#/components/responses/500"
    put:
      security:
        - bearerAuth: []
      tags:
        - Application
      operationId: crupdateApplications
      summary: Create or update applications
      requestBody:
        required: true
        description: Application to crupdate
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrupdateApplicationsRequestBody"
      responses:
        "200":
          description: The created applications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrupdateApplicationsResponse"
        "400":
          $ref: "./api.yml#/components/responses/400"
        "403":
          $ref: "./api.yml#/components/responses/403"
        "404":
          $ref: "./api.yml#/components/responses/404"
        "429":
          $ref: "./api.yml#/components/responses/429"
        "500":
          $ref: "./api.yml#/components/responses/500"
  orgApplication:
    parameters:
      - $ref: "./api.yml#/components/parameters/orgId"
    post:
      security:
        - bearerAuth: []
      tags:
        - Application
      operationId: createAndDeployApp
      summary: Creates and deploys a new application with a config and envs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAndDeployAppRequestBody"
      responses:
        "200":
          description: The created app with its env
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAndDeployAppResponse"
        "400":
          $ref: "./api.yml#/components/responses/400"
        "403":
          $ref: "./api.yml#/components/responses/403"
        "404":
          $ref: "./api.yml#/components/responses/404"
        "429":
          $ref: "./api.yml#/components/responses/429"
        "500":
          $ref: "./api.yml#/components/responses/500"
  orgApplicationsById:
    parameters:
      - $ref: "./api.yml#/components/parameters/orgId"
      - $ref: "./api.yml#/components/parameters/applicationId"
    get:
      security:
        - bearerAuth: []
      tags:
        - Application
      operationId: getApplicationById
      summary: Get an application by identifier
      responses:
        "200":
          description: The specified application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "400":
          $ref: "./api.yml#/components/responses/400"
        "403":
          $ref: "./api.yml#/components/responses/403"
        "404":
          $ref: "./api.yml#/components/responses/404"
        "429":
          $ref: "./api.yml#/components/responses/429"
        "500":
          $ref: "./api.yml#/components/responses/500"
  applicationStatuses:
    parameters:
      - $ref: "./api.yml#/components/parameters/orgId"
      - $ref: "./api.yml#/components/parameters/applicationId"
    put:
      tags:
        - Application
      summary: suspends or activates an application
      operationId: updateAppStatus
      requestBody:
        required: true
        description: action todo
        content:
          "application/json":
            schema:
              $ref: "#/components/schemas/UpdateAppStatusRequestBody"
      responses:
        "200":
          description: updated application with new status if applied
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/Application"
        "400":
          $ref: "./api.yml#/components/responses/400"
        "404":
          $ref: "./api.yml#/components/responses/404"
        "429":
          $ref: "./api.yml#/components/responses/429"
        "500":
          $ref: "./api.yml#/components/responses/500"
  applicationDeployments:
    parameters:
      - $ref: "./api.yml#/components/parameters/orgId"
      - $ref: "./api.yml#/components/parameters/applicationId"
      - name: environmentType
        in: query
        required: false
        schema:
          $ref: "./environment-api.yml#/components/schemas/EnvironmentType"
      - name: startDatetime
        in: query
        required: false
        schema:
          type: string
          format: date-time
      - name: endDatetime
        in: query
        required: false
        schema:
          type: string
          format: date-time
      - $ref: "./api.yml#/components/parameters/page"
      - $ref: "./api.yml#/components/parameters/page_size"
    get:
      security:
        - bearerAuth: []
      tags:
        - Application
      operationId: getApplicationDeployments
      summary: Get application deployments, ordered by creationDatetime
      responses:
        "200":
          description: Application deployments ordered by creation datetime
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedDeploymentsResponse"
        "400":
          $ref: "./api.yml#/components/responses/400"
        "403":
          $ref: "./api.yml#/components/responses/403"
        "404":
          $ref: "./api.yml#/components/responses/404"
        "429":
          $ref: "./api.yml#/components/responses/429"
        "500":
          $ref: "./api.yml#/components/responses/500"
  applicationDeploymentsById:
    parameters:
      - $ref: "./api.yml#/components/parameters/orgId"
      - $ref: "./api.yml#/components/parameters/applicationId"
      - $ref: "./api.yml#/components/parameters/deploymentId"
    get:
      security:
        - bearerAuth: []
      tags:
        - Application
      operationId: getApplicationDeployment
      summary: Get a specific application deployment
      responses:
        "200":
          description: the queried deployment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppEnvDeployment"
        "400":
          $ref: "./api.yml#/components/responses/400"
        "403":
          $ref: "./api.yml#/components/responses/403"
        "404":
          $ref: "./api.yml#/components/responses/404"
        "429":
          $ref: "./api.yml#/components/responses/429"
        "500":
          $ref: "./api.yml#/components/responses/500"
  applicationDeploymentConfig:
    parameters:
      - $ref: "./api.yml#/components/parameters/orgId"
      - $ref: "./api.yml#/components/parameters/applicationId"
      - $ref: "./api.yml#/components/parameters/deploymentId"
    get:
      security:
        - bearerAuth: []
      tags:
        - Application
      operationId: getApplicationDeploymentConfig
      summary: Get a specific application deployment config
      responses:
        "200":
          description: the config for the queried deployment
          content:
            application/json:
              schema:
                $ref: "./poja-related-api.yml#/components/schemas/OneOfPojaConf"
        "400":
          $ref: "./api.yml#/components/responses/400"
        "403":
          $ref: "./api.yml#/components/responses/403"
        "404":
          $ref: "./api.yml#/components/responses/404"
        "429":
          $ref: "./api.yml#/components/responses/429"
        "500":
          $ref: "./api.yml#/components/responses/500"
  applicationDeploymentStates:
    parameters:
      - $ref: "./api.yml#/components/parameters/orgId"
      - $ref: "./api.yml#/components/parameters/applicationId"
      - $ref: "./api.yml#/components/parameters/deploymentId"
    get:
      security:
        - bearerAuth: []
      tags:
        - Application
      operationId: getApplicationDeploymentStates
      summary: Get the states of a deployment
      responses:
        "200":
          description: The states for the queried deployment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentState"
        "400":
          $ref: "./api.yml#/components/responses/400"
        "403":
          $ref: "./api.yml#/components/responses/403"
        "404":
          $ref: "./api.yml#/components/responses/404"
        "429":
          $ref: "./api.yml#/components/responses/429"
        "500":
          $ref: "./api.yml#/components/responses/500"
  AppSetupStates:
    parameters:
      - $ref: "./api.yml#/components/parameters/orgId"
      - $ref: "./api.yml#/components/parameters/applicationId"
    get:
      security:
        - bearerAuth: [ ]
      tags:
        - Application
      operationId: getAppSetupStates
      summary: get setup states of the identified application
      responses:
        "200":
          description: setup states of the identified application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAppSetupStatesResponse"
        "400":
          $ref: "./api.yml#/components/responses/400"
        "403":
          $ref: "./api.yml#/components/responses/403"
        "404":
          $ref: "./api.yml#/components/responses/404"
        "429":
          $ref: "./api.yml#/components/responses/429"
        "500":
          $ref: "./api.yml#/components/responses/500"
  applicationTemplates:
    get:
      security:
        - bearerAuth: [ ]
      tags:
        - Application
      operationId: getApplicationTemplates
      summary: Get application templates
      responses:
        "200":
          description: list of application templates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetApplicationTemplatesResponse"
        "400":
          $ref: "./api.yml#/components/responses/400"
        "403":
          $ref: "./api.yml#/components/responses/403"
        "404":
          $ref: "./api.yml#/components/responses/404"
        "429":
          $ref: "./api.yml#/components/responses/429"
        "500":
          $ref: "./api.yml#/components/responses/500"
  applicationTemplateById:
    parameters:
      - $ref: "./api.yml#/components/parameters/templateId"
    get:
      security:
        - bearerAuth: [ ]
      tags:
        - Application
      operationId: getApplicationTemplateById
      summary: Get an application template by identifier
      responses:
        "200":
          description: The specified application template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationTemplate"
        "400":
          $ref: "./api.yml#/components/responses/400"
        "403":
          $ref: "./api.yml#/components/responses/403"
        "404":
          $ref: "./api.yml#/components/responses/404"
        "429":
          $ref: "./api.yml#/components/responses/429"
        "500":
          $ref: "./api.yml#/components/responses/500"
  applicationTemplateConfigById:
    parameters:
      - $ref: "./api.yml#/components/parameters/templateId"
    get:
      security:
        - bearerAuth: [ ]
      tags:
        - Application
      operationId: getApplicationTemplateConfigById
      summary: Get an application template config by identifier
      responses:
        "200":
          description: The specified application template config
          content:
            application/json:
              schema:
                $ref: "./poja-related-api.yml#/components/schemas/OneOfPojaConf"
        "400":
          $ref: "./api.yml#/components/responses/400"
        "403":
          $ref: "./api.yml#/components/responses/403"
        "404":
          $ref: "./api.yml#/components/responses/404"
        "429":
          $ref: "./api.yml#/components/responses/429"
        "500":
          $ref: "./api.yml#/components/responses/500"
  cloneApplicationTemplate:
    parameters:
      - $ref: "./api.yml#/components/parameters/orgId"
      - $ref: "./api.yml#/components/parameters/templateId"
    post:
      security:
        - bearerAuth: [ ]
      tags:
        - Application
      operationId: cloneApplicationTemplate
      summary: Create and deploy an application from a template
      requestBody:
        required: true
        description: Create and deploy an application from a template with the provided config and env
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloneApplicationTemplateRequestBody"
      responses:
        "200":
          description: The created application
          content:
            application/json:
              schema:
                type: object
                properties:
                  application:
                    # TODO: new model
                    $ref: "#/components/schemas/CreateAndDeployAppResponse"
        "400":
          $ref: "./api.yml#/components/responses/400"
        "403":
          $ref: "./api.yml#/components/responses/403"
        "404":
          $ref: "./api.yml#/components/responses/404"
        "429":
          $ref: "./api.yml#/components/responses/429"
        "500":
          $ref: "./api.yml#/components/responses/500"

components:
  schemas:
    ApplicationTemplate:
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        repository_url:
          type: string
          format: uri
        demo_url:
          type: string
          format: uri
        with_custom_config:
          type: boolean
    GetApplicationTemplatesResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ApplicationTemplate"
    CloneApplicationTemplateRequestBody:
      type: object
      properties:
        environment:
          $ref: "./environment-api.yml#/components/schemas/CrupdateEnvironment"
        application:
          $ref: "#/components/schemas/CloneTemplateApplication"
        envConf:
          $ref: "./environment-api.yml#/components/schemas/EnvConf"
    CrupdateApplicationsRequestBody:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ApplicationBase"
    CrupdateApplicationsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Application"
    CloneTemplateApplication:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        repository_name:
          type: string
        is_private:
          type: boolean
        installation_id:
          type: string
        user_id:
          type: string
    ApplicationBase:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        archived:
          type: boolean
          default: false
        user_id:
          type: string
        org_id:
          type: string
        application_import:
          $ref: "./importer-api.yml#/components/schemas/ApplicationImport"
        github_repository:
          $ref: "#/components/schemas/GithubRepository"
    GithubRepository:
      type: object
      properties:
        name:
          type: string
        is_private:
          type: boolean
        description:
          type: string
        installation_id:
          type: string
        html_url:
          type: string
          format: uri
        id:
          type: string
    Application:
      allOf:
        - $ref: "#/components/schemas/ApplicationBase"
      properties:
        creation_datetime:
          type: string
          format: date-time
        status:
          type: string
          enum:
            - ACTIVE
            - SUSPENDED
            - UNDER_MODIFICATION
            - UNKNOWN
        environment:
          type: array
          items:
            $ref: "./environment-api.yml#/components/schemas/Environment"
    UpdateAppStatusRequestBody:
      type: object
      properties:
        action:
          type: string
          enum:
            - ACTIVATE
            - SUSPEND
    PagedUserApplicationsResponse:
      type: object
      allOf:
        - $ref: "./api.yml#/components/schemas/PagedResponse"
        - properties:
            user_apps_count:
              type: integer
              format: int64
            data:
              type: array
              items:
                $ref: "#/components/schemas/Application"
    PagedApplicationsResponse:
      type: object
      allOf:
        - $ref: "./api.yml#/components/schemas/PagedResponse"
        - properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Application"
    PagedDeploymentsResponse:
      allOf:
        - $ref: "./api.yml#/components/schemas/PagedResponse"
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AppEnvDeployment"
    DeploymentState:
      type: object
      properties:
        id:
          type: string
        timestamp:
          type: string
          format: date-time
        progressionStatus:
          $ref: "#/components/schemas/DeploymentStateEnum"
        executionType:
          $ref: "#/components/schemas/ExecutionType"
        nextState:
          $ref: "#/components/schemas/DeploymentState"
    DeploymentStateEnum:
      type: string
      enum:
        - CANCELED
        - CANCELING
        - CODE_GENERATION_IN_PROGRESS
        - CODE_PUSH_IN_PROGRESS
        - CODE_PUSH_FAILED
        - CODE_PUSH_SUCCESS
        - DEPLOYMENT_WORKFLOW_IN_PROGRESS
        - DEPLOYMENT_WORKFLOW_FAILED
        - TEMPLATE_FILE_CHECK_IN_PROGRESS
        - TEMPLATE_FILE_CHECK_FAILED
        - INDEPENDENT_STACKS_DEPLOYMENT_QUEUED
        - INDEPENDENT_STACKS_DEPLOYMENT_INITIATED
        - INDEPENDENT_STACKS_DEPLOYMENT_IN_PROGRESS
        - INDEPENDENT_STACKS_DEPLOYED
        - INDEPENDENT_STACKS_DEPLOYMENT_FAILED
        - COMPUTE_STACK_DEPLOYMENT_IN_PROGRESS
        - COMPUTE_STACK_DEPLOYMENT_FAILED
        - COMPUTE_STACK_DEPLOYED
    ExecutionType:
      type: string
      enum:
        - SYNCHRONOUS
        - ASYNCHRONOUS
    GithubUserMeta:
      type: object
      properties:
        login:
          type: string
        email:
          type: string
        name:
          type: string
        github_id:
          type: string
        avatar_url:
          type: string
          format: uri
        is_jc_bot:
          type: boolean
    GithubMeta:
      type: object
      properties:
        workflow:
          type: object
          properties:
            run_id:
              type: string
            run_uri:
              type: string
              format: uri
            run_attempt:
              type: string
        commit:
          type: object
          properties:
            branch:
              type: string
            committer:
              $ref: "#/components/schemas/GithubUserMeta"
            message:
              type: string
            sha:
              type: string
            url:
              type: string
              format: uri
        tag:
          type: object
          properties:
            name:
              type: string
            message:
              type: string
            url:
              type: string
              format: uri
        repo:
          type: object
          properties:
            name:
              type: string
            owner_name:
              type: string
    AppEnvDeployment:
      type: object
      properties:
        id:
          type: string
        github_meta:
          $ref: "#/components/schemas/GithubMeta"
        application_id:
          type: string
        environment_id:
          type: string
        conf_id:
          type: string
        deployed_url:
          type: string
          format: uri
        creation_datetime:
          type: string
          format: date-time
    CreateAndDeployAppRequestBody:
      type: object
      properties:
        application:
          $ref: "#/components/schemas/ApplicationBase"
        environment:
          $ref: "environment-api.yml#/components/schemas/CrupdateEnvironment"
        envConf:
          $ref: "./environment-api.yml#/components/schemas/EnvConf"
    CreateAndDeployAppResponse:
      type: object
      properties:
        application:
          $ref: "#/components/schemas/Application"
        environment:
          $ref: "environment-api.yml#/components/schemas/Environment"
    GetAppSetupStatesResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AppSetupState"
    AppSetupState:
      description: Represents the state of an application setup, including its progressions status
      properties:
        id:
          type: string
        timestamp:
          type: string
          format: date-time
        progressionStatus:
          $ref: "#/components/schemas/AppSetupStateEnum"
        executionType:
          $ref: "#/components/schemas/ExecutionType"
    AppSetupStateEnum:
      type: string
      enum:
        - ENV_CREATION_IN_PROGRESS
        - ENV_CREATION_FAILED
        - ENV_CREATION_SUCCESS
        - REPO_CREATION_IN_PROGRESS
        - REPO_CREATION_FAILED
        - REPO_CREATION_SUCCESS
        - ENV_DEPLOYMENT_INITIATION_FAILED
        - ENV_DEPLOYMENT_INITIATED
        - ENV_DEPLOYMENT_INITIATION_IN_PROGRESS
