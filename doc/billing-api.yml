openapi: 3.1.0
operations:
  userBilling:
    parameters:
      - $ref: "./api.yml#/components/parameters/userId"
      - $ref: "./api.yml#/components/parameters/startTime"
      - $ref: "./api.yml#/components/parameters/endTime"
      - $ref: "./api.yml#/components/parameters/year"
      - $ref: "./api.yml#/components/parameters/month"
    get:
      security:
        - bearerAuth: []
      tags:
        - User
        - Billing
      operationId: getUserBillingInfo
      summary: get user latest computed billing info
      description: >
        get user latest computed billing info .
        current day's data might not be accurate as resource usage
        might still occur at the moment and computation takes much time
        hence, the most accurate data will be of the past days.
      responses:
        "200":
          description: latest billing info summary before the date-time interval, range is inclusive
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/UserBillingInfo"
        "400":
          $ref: "./api.yml#/components/responses/400"
        "403":
          $ref: "./api.yml#/components/responses/403"
        "404":
          $ref: "./api.yml#/components/responses/404"
        "429":
          $ref: "./api.yml#/components/responses/429"
        "500":
          $ref: "./api.yml#/components/responses/500"
  appBilling:
    parameters:
      - $ref: "./api.yml#/components/parameters/orgId"
      - $ref: "./api.yml#/components/parameters/applicationId"
      - $ref: "./api.yml#/components/parameters/startTime"
      - $ref: "./api.yml#/components/parameters/endTime"
      - $ref: "./api.yml#/components/parameters/year"
      - $ref: "./api.yml#/components/parameters/month"
    get:
      security:
        - bearerAuth: []
      tags:
        - Application
        - Billing
      operationId: getOrgApplicationBillingInfo
      summary: get org latest computed billing info grouped by app
      description: >
        get org latest computed billing info grouped by app.
        current day's data might not be accurate as resource usage
        might still occur at the moment and computation takes much time
        hence, the most accurate data will be of the past days.
      responses:
        "200":
          description: latest billing info summary before the date-time interval, range is inclusive
          content:
            "application/json":
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EnvBillingInfo"
        "400":
          $ref: "./api.yml#/components/responses/400"
        "403":
          $ref: "./api.yml#/components/responses/403"
        "404":
          $ref: "./api.yml#/components/responses/404"
        "429":
          $ref: "./api.yml#/components/responses/429"
        "500":
          $ref: "./api.yml#/components/responses/500"
  envBilling:
    parameters:
      - $ref: "./api.yml#/components/parameters/orgId"
      - $ref: "./api.yml#/components/parameters/applicationId"
      - $ref: "./api.yml#/components/parameters/environmentId"
      - $ref: "./api.yml#/components/parameters/startTime"
      - $ref: "./api.yml#/components/parameters/endTime"
      - $ref: "./api.yml#/components/parameters/year"
      - $ref: "./api.yml#/components/parameters/month"
    get:
      security:
        - bearerAuth: []
      tags:
        - Environment
        - Billing
      operationId: getOrgAppEnvironmentBillingInfo
      summary: get org latest computed billing info grouped by env
      description: >
        get org latest computed billing info grouped by env.
        current day's data might not be accurate as resource usage
        might still occur at the moment and computation takes much time
        hence, the most accurate data will be of the past days.
      responses:
        "200":
          description: latest billing info summary before the date-time interval, range is inclusive
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/EnvBillingInfo"
        "400":
          $ref: "./api.yml#/components/responses/400"
        "403":
          $ref: "./api.yml#/components/responses/403"
        "404":
          $ref: "./api.yml#/components/responses/404"
        "429":
          $ref: "./api.yml#/components/responses/429"
        "500":
          $ref: "./api.yml#/components/responses/500"
  orgBilling:
    parameters:
      - $ref: "./api.yml#/components/parameters/orgId"
      - $ref: "./api.yml#/components/parameters/startTime"
      - $ref: "./api.yml#/components/parameters/endTime"
      - $ref: "./api.yml#/components/parameters/year"
      - $ref: "./api.yml#/components/parameters/month"
    get:
      security:
        - bearerAuth: []
      tags:
        - Organization
        - Billing
      operationId: getOrgBillingInfo
      summary: get user latest computed billing info grouped by env
      description: >
        get user latest computed billing info grouped by env.
        current day's data might not be accurate as resource usage
        might still occur at the moment and computation takes much time
        hence, the most accurate data will be of the past days.
      responses:
        "200":
          description: latest billing info summary before the date-time interval, range is inclusive
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/OrgBillingInfo"
        "400":
          $ref: "./api.yml#/components/responses/400"
        "403":
          $ref: "./api.yml#/components/responses/403"
        "404":
          $ref: "./api.yml#/components/responses/404"
        "429":
          $ref: "./api.yml#/components/responses/429"
        "500":
          $ref: "./api.yml#/components/responses/500"
  orgsBilling:
    parameters:
      - $ref: "./api.yml#/components/parameters/userId"
      - $ref: "./api.yml#/components/parameters/page"
      - $ref: "./api.yml#/components/parameters/page_size"
      - $ref: "./api.yml#/components/parameters/startTime"
      - $ref: "./api.yml#/components/parameters/endTime"
      - $ref: "./api.yml#/components/parameters/year"
      - $ref: "./api.yml#/components/parameters/month"
    get:
      security:
        - bearerAuth: []
      tags:
        - Admin
        - Billing
      operationId: getUserOrgsBillingInfo
      summary: get users latest computed billing info sorted by amount desc
      description: >
        get users latest computed billing info .
        current day's data might not be accurate as resource usage
        might still occur at the moment and computation takes much time
        hence, the most accurate data will be of the past days.
      responses:
        "200":
          description: latest billing info summary before the date-time interval, range is inclusive
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/PagedOrgsBillingInfoResponse"
        "400":
          $ref: "./api.yml#/components/responses/400"
        "403":
          $ref: "./api.yml#/components/responses/403"
        "404":
          $ref: "./api.yml#/components/responses/404"
        "429":
          $ref: "./api.yml#/components/responses/429"
        "500":
          $ref: "./api.yml#/components/responses/500"
  usersBilling:
    parameters:
      - $ref: "./api.yml#/components/parameters/page"
      - $ref: "./api.yml#/components/parameters/page_size"
      - $ref: "./api.yml#/components/parameters/startTime"
      - $ref: "./api.yml#/components/parameters/endTime"
      - $ref: "./api.yml#/components/parameters/year"
      - $ref: "./api.yml#/components/parameters/month"
      - $ref: "./api.yml#/components/parameters/archived"
      - $ref: "./api.yml#/components/parameters/username"
      - $ref: "./api.yml#/components/parameters/sortOrder"
      - $ref: "./api.yml#/components/parameters/sortBy"
      - $ref: "./api.yml#/components/parameters/joinedFrom"
      - $ref: "./api.yml#/components/parameters/joinedTo"
    get:
      security:
        - bearerAuth: []
      tags:
        - Admin
        - Billing
      operationId: getUsersBillingInfo
      summary: get users latest computed billing info
      description: >
        get users latest computed billing info sortable by suspension duration or computed billing (default),
        current day's data might not be accurate as resource usage
        might still occur at the moment and computation takes much time
        hence, the most accurate data will be of the past days.
      responses:
        "200":
          description: latest billing info summary before the date-time interval, range is inclusive
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/PagedUsersBillingInfoResponse"
        "400":
          $ref: "./api.yml#/components/responses/400"
        "403":
          $ref: "./api.yml#/components/responses/403"
        "404":
          $ref: "./api.yml#/components/responses/404"
        "429":
          $ref: "./api.yml#/components/responses/429"
        "500":
          $ref: "./api.yml#/components/responses/500"
  userDiscounts:
    get:
      security:
        - bearerAuth: []
      tags:
        - Admin
        - Billing
      parameters:
        - $ref: "./api.yml#/components/parameters/userId"
        - $ref: "./api.yml#/components/parameters/year"
        - $ref: "./api.yml#/components/parameters/month"
      operationId: getUserBillingDiscounts
      summary: get granted discounts to the identified user
      description: >
         get granted discounts to the identified user on the given year and month.
      responses:
        "200":
          description: The granted discounts to the identified user
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/GetUserBillingDiscountResponse"
        "400":
          $ref: "./api.yml#/components/responses/400"
        "403":
          $ref: "./api.yml#/components/responses/403"
        "404":
          $ref: "./api.yml#/components/responses/404"
        "429":
          $ref: "./api.yml#/components/responses/429"
        "500":
          $ref: "./api.yml#/components/responses/500"
    put:
      security:
        - bearerAuth: []
      tags:
        - Admin
        - Billing
      parameters:
        - $ref: "./api.yml#/components/parameters/userId"
      operationId: grantUserDiscount
      summary: grant a billing discount to a user
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserBillingDiscount"
      responses:
        "200":
          description: The granted billing discount
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/UserBillingDiscount"
        "400":
          $ref: "./api.yml#/components/responses/400"
        "403":
          $ref: "./api.yml#/components/responses/403"
        "404":
          $ref: "./api.yml#/components/responses/404"
        "429":
          $ref: "./api.yml#/components/responses/429"
        "500":
          $ref: "./api.yml#/components/responses/500"

components:
  schemas:
    PagedUsersBillingInfoResponse:
      type: object
      allOf:
        - $ref: "./api.yml#/components/schemas/PagedResponse"
        - properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/UserBillingInfoWithAws"
    PagedOrgsBillingInfoResponse:
      type: object
      allOf:
        - $ref: "./api.yml#/components/schemas/PagedResponse"
        - properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/OrgBillingInfo"
    GetUserBillingDiscountResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/UserBillingDiscount"
    OrgBillingInfo:
      allOf:
        - $ref: "#/components/schemas/BillingInfo"
      properties:
        user_id:
          type: string
        org_id:
          type: string
    UserBillingInfo:
      allOf:
        - $ref: "#/components/schemas/BillingInfo"
      properties:
        user_id:
          type: string
    UserBillingInfoWithAws:
      allOf:
        - $ref: "#/components/schemas/UserBillingInfo"
      properties:
        aws_cost:
          type: number
        cost_margin:
          type: number
        aws_cost_updated_at:
          type: string
          format: date-time
    EnvBillingInfo:
      allOf:
        - $ref: "#/components/schemas/BillingInfo"
      properties:
        user_id:
          type: string
        app_id:
          type: string
        env_id:
          type: string
    BillingInfo:
      type: object
      properties:
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        pricing_method:
          type: string
        compute_time:
          type: string
          format: date-time
        computed_price:
          type: number
        resource_invocation_total_duration:
          $ref: "#/components/schemas/Duration"
    UserBillingDiscount:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        year:
          type: integer
          example: 2025
        month:
          $ref: "./payment-api.yml#/components/schemas/MonthType"
        amount:
          type: number
        description:
          type: string
        creation_datetime:
          type: string
          format: date-time
    SortOrder:
      type: string
      enum:
        - ASC
        - DESC
    SortBy:
      type: string
      enum:
        - SUSPENSION_DURATION
        - COMPUTED_BILLING_PRICE
        - JOIN_DATE
        - LAST_CONNECTION
        - COST
        - COST_MARGIN
    JoinedFrom:
      type: string
      format: date-time
    JoinedTo:
      type: string
      format: date-time
    Duration:
      type: object
      properties:
        amount:
          type: number
          format: double
        unit:
          $ref: "#/components/schemas/DurationUnit"
    DurationUnit:
      type: string
      enum:
        - MINUTES
