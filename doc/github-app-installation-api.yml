openapi: 3.1.0
operations:
  userInstallations:
    parameters:
      - $ref: "./api.yml#/components/parameters/userId"
    get:
      security:
        - bearerAuth: []
      tags:
        - GithubAppInstallation
      operationId: getUserInstallations
      summary: get all user installations of app
      responses:
        "200":
          description: list of installations
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/GithubAppInstallationsResponse"
        "400":
          $ref: "./api.yml#/components/responses/400"
        "403":
          $ref: "./api.yml#/components/responses/403"
        "404":
          $ref: "./api.yml#/components/responses/404"
        "429":
          $ref: "./api.yml#/components/responses/429"
        "500":
          $ref: "./api.yml#/components/responses/500"
    put:
      security:
        - bearerAuth: []
      tags:
        - GithubAppInstallation
      operationId: crupdateUserGithubAppInstallations
      summary: for each installation, it will create if id exist, update it otherwise
      requestBody:
        content:
          "application/json":
            schema:
              $ref: "#/components/schemas/CrupdateGithubAppInstallationsRequestBody"
      responses:
        "200":
          description: created or updated installations
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/CrupdateGithubAppInstallationsResponse"
        "400":
          $ref: "./api.yml#/components/responses/400"
        "403":
          $ref: "./api.yml#/components/responses/403"
        "404":
          $ref: "./api.yml#/components/responses/404"
        "429":
          $ref: "./api.yml#/components/responses/429"
        "500":
          $ref: "./api.yml#/components/responses/500"
  installations:
    parameters:
      - $ref: "./api.yml#/components/parameters/orgId"
    get:
      security:
        - bearerAuth: []
      tags:
        - GithubAppInstallation
      operationId: getOrgInstallations
      summary: get all org installations of jcloudify app
      responses:
        "200":
          description: list of installations
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/GithubAppInstallationsResponse"
        "400":
          $ref: "./api.yml#/components/responses/400"
        "403":
          $ref: "./api.yml#/components/responses/403"
        "404":
          $ref: "./api.yml#/components/responses/404"
        "429":
          $ref: "./api.yml#/components/responses/429"
        "500":
          $ref: "./api.yml#/components/responses/500"
    put:
      security:
        - bearerAuth: []
      tags:
        - GithubAppInstallation
      operationId: crupdateGithubAppInstallations
      summary: for each installation, it will create if id exist, update it otherwise
      requestBody:
        content:
          "application/json":
            schema:
              $ref: "#/components/schemas/CrupdateGithubAppInstallationsRequestBody"
      responses:
        "200":
          description: created or updated installations
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/CrupdateGithubAppInstallationsResponse"
        "400":
          $ref: "./api.yml#/components/responses/400"
        "403":
          $ref: "./api.yml#/components/responses/403"
        "404":
          $ref: "./api.yml#/components/responses/404"
        "429":
          $ref: "./api.yml#/components/responses/429"
        "500":
          $ref: "./api.yml#/components/responses/500"
  repositories:
    parameters:
      - $ref: "./api.yml#/components/parameters/orgId"
      - $ref: "./api.yml#/components/parameters/page"
      - $ref: "./api.yml#/components/parameters/page_size"
      - name: installationId
        in: path
        required: true
        description: installationId owner of repositories
        schema:
          type: string
    get:
      security:
        - bearerAuth: []
      tags:
        - GithubAppInstallation
      operationId: getOrgInstallationRepositories
      summary: get paged list of a user installation's repositories
      responses:
        "200":
          description: paged list of installations
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/PagedGithubRepositoryResponse"
        "400":
          $ref: "./api.yml#/components/responses/400"
        "403":
          $ref: "./api.yml#/components/responses/403"
        "404":
          $ref: "./api.yml#/components/responses/404"
        "429":
          $ref: "./api.yml#/components/responses/429"
        "500":
          $ref: "./api.yml#/components/responses/500"
  searchRepositories:
    parameters:
      - $ref: "./api.yml#/components/parameters/userId"
      - $ref: "./api.yml#/components/parameters/q"
      - $ref: "./api.yml#/components/parameters/page"
      - $ref: "./api.yml#/components/parameters/page_size"
      - name: installationId
        in: path
        required: true
        description: installationId owner of repositories
        schema:
          type: string
    get:
      security:
        - bearerAuth: []
      tags:
        - GithubAppInstallation
      operationId: searchUserInstallationRepositories
      summary: get paged list of a user installation's repositories matching the provided query
      responses:
        "200":
          description: paged list of repositories
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/PagedGithubRepositoryResponse"
        "400":
          $ref: "./api.yml#/components/responses/400"
        "403":
          $ref: "./api.yml#/components/responses/403"
        "404":
          $ref: "./api.yml#/components/responses/404"
        "429":
          $ref: "./api.yml#/components/responses/429"
        "500":
          $ref: "./api.yml#/components/responses/500"
  userRepositories:
    parameters:
      - $ref: "./api.yml#/components/parameters/userId"
      - $ref: "./api.yml#/components/parameters/page"
      - $ref: "./api.yml#/components/parameters/page_size"
      - name: installationId
        in: path
        required: true
        description: installationId owner of repositories
        schema:
          type: string
    get:
      security:
        - bearerAuth: []
      tags:
        - GithubAppInstallation
      operationId: getUserInstallationRepositories
      summary: get paged list of a user installation's repositories
      responses:
        "200":
          description: paged list of installations
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/PagedGithubRepositoryResponse"
        "400":
          $ref: "./api.yml#/components/responses/400"
        "403":
          $ref: "./api.yml#/components/responses/403"
        "404":
          $ref: "./api.yml#/components/responses/404"
        "429":
          $ref: "./api.yml#/components/responses/429"
        "500":
          $ref: "./api.yml#/components/responses/500"

components:
  schemas:
    CreateGithubAppInstallation:
      type: object
      properties:
        id:
          type: string
        gh_installation_id:
          type: integer
          format: int64
    GithubAppInstallation:
      type: object
      allOf:
        - $ref: "#/components/schemas/CreateGithubAppInstallation"
      properties:
        owner:
          type: string
        type:
          type: string
        gh_avatar_url:
          type: string
        repository_selection:
          $ref: "#/components/schemas/GithubAppInstallationRepositorySelection"
    GithubAppInstallationsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/GithubAppInstallation"
    GithubAppInstallationRepositorySelection:
      type: string
      enum:
        - ALL
        - SELECTED
    CrupdateGithubAppInstallationsRequestBody:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CreateGithubAppInstallation"
    CrupdateGithubAppInstallationsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/GithubAppInstallation"
    PagedGithubRepositoryResponse:
      type: object
      allOf:
        - $ref: "./api.yml#/components/schemas/PagedResponse"
        - properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/GithubRepositoryListItem"
    GithubRepositoryListItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        is_private:
          type: boolean
        description:
          type: string
        installation_id:
          type: string
        html_url:
          type: string
          format: uri
        default_branch:
          type: string
        is_empty:
          type: boolean
